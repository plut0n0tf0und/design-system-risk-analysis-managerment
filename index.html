<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin:0; font-family:sans-serif; min-height:100vh; }

    .trigger {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      cursor:pointer;
    }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      background:rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index:9999;
    }

    .modal-content {
      position:relative;
      width:100vw;
      height:100vh;
      background:#fff;
      border-radius:0;
      overflow:hidden;
    }

    .close {
      position:absolute;
      top:20px;
      right:25px;
      font-size:28px;
      color:white;
      cursor:pointer;
      z-index:10000;
    }

    iframe { width:100%; height:100%; border:none; }
  </style>
</head>

<body>
  <div onclick="openModal()" class="trigger"></div>

  <div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="close" onclick="closeModal()">×</div>
      <iframe src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/8klTUHwt1pgh5OAjtWIlVo/Bento-Dashboard?node-id=1999-83424"></iframe>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').style.display = 'block';
    }
    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>
</body>
</html>
